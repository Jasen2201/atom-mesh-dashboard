<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATOM Mesh PD Benchmark</title>
  <script>if(localStorage.getItem('amd-dash-theme')==='light')document.documentElement.setAttribute('data-theme','light');</script>
  <style>
    :root {
      --bg-primary: #0b0c10; --bg-secondary: #141519; --bg-tertiary: #1c1d24;
      --border: #303140; --border-light: #262733;
      --text-primary: #eef0f6; --text-secondary: #bfc1d0; --text-tertiary: #7e8094;
      --brand: #d86ecc; --ui: #8899b8; --ui-bright: #a4b3ce;
      --accent-green: #6dbf80; --accent-red: #f25c4e; --accent-orange: #eda06a;
      --accent-purple: #c49af5; --accent-yellow: #ddb040; --accent-blue: #6db2f0;
      --gap-sm: 8px; --gap-md: 16px; --gap-lg: 24px; --radius: 8px;
    }
    [data-theme="light"] {
      --bg-primary: #f5f6fa; --bg-secondary: #ffffff; --bg-tertiary: #ebedf3;
      --border: #d0d3dc; --border-light: #e2e4eb;
      --text-primary: #1a1c24; --text-secondary: #4a4d5e; --text-tertiary: #7e8094;
      --brand: #c054b4; --ui: #5a6d8a; --ui-bright: #3d5278;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-secondary); font-size: 13px; }
    .container { max-width: 1440px; margin: 0 auto; padding: var(--gap-lg); }
    a { color: var(--ui-bright); text-decoration: none; }
    code { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 12px; background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; }

    header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--gap-md); padding-bottom: var(--gap-md); border-bottom: 2px solid var(--brand); margin-bottom: var(--gap-lg); }
    .header-left { display: flex; flex-direction: column; gap: 2px; }
    h1 { font-size: 20px; color: var(--text-primary); font-weight: 600; }
    h1 .h1-sub { color: var(--text-secondary); font-weight: 400; margin-left: 6px; }
    .meta { font-size: 12px; color: var(--text-tertiary); }
    .header-right { display: flex; gap: var(--gap-sm); align-items: center; }
    .theme-toggle { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
    .theme-toggle:hover { background: var(--bg-tertiary); color: var(--text-primary); }

    .filter-bar { display: flex; gap: var(--gap-sm); flex-wrap: wrap; align-items: center; margin-bottom: var(--gap-lg); padding: var(--gap-md); background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); }
    .filter-bar label { font-size: 12px; color: var(--text-tertiary); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-bar select { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 12px; min-width: 100px; }
    .filter-bar select:hover { border-color: var(--ui); }
    .filter-reset { background: none; color: var(--text-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; margin-left: auto; }
    .filter-reset:hover { color: var(--text-secondary); background: var(--bg-tertiary); }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--gap-md); margin-bottom: var(--gap-lg); }
    .kpi-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--gap-md); }
    .kpi-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .kpi-value { font-size: 24px; font-weight: 700; color: var(--text-primary); font-family: "SF Mono", "Fira Code", monospace; }
    .kpi-unit { font-size: 13px; color: var(--text-tertiary); font-weight: 400; margin-left: 4px; }
    .kpi-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

    .tabs { display: flex; gap: 2px; margin-bottom: var(--gap-md); border-bottom: 1px solid var(--border); }
    .tab { background: none; border: none; color: var(--text-tertiary); padding: 10px 18px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab:hover { color: var(--text-secondary); }
    .tab.active { color: var(--text-primary); border-bottom-color: var(--brand); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .chart-wrap { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--gap-md); }
    .chart-controls { display: flex; gap: var(--gap-sm); align-items: center; flex-wrap: wrap; margin-bottom: var(--gap-md); }
    .chart-controls label { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-controls select { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 12px; }
    .chart-canvas { position: relative; height: 520px; }
    .empty-msg { padding: 60px 20px; text-align: center; color: var(--text-tertiary); }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    table th, table td { padding: 8px 12px; text-align: right; border-bottom: 1px solid var(--border-light); }
    table th { background: var(--bg-tertiary); color: var(--text-primary); font-weight: 600; cursor: pointer; user-select: none; position: sticky; top: 0; }
    table th:hover { background: var(--border); }
    table th.sort-asc::after { content: " ▲"; color: var(--ui-bright); }
    table th.sort-desc::after { content: " ▼"; color: var(--ui-bright); }
    table th:first-child, table td:first-child { text-align: left; }
    table tbody tr:hover { background: var(--bg-tertiary); }
    .num { font-family: "SF Mono", "Fira Code", monospace; color: var(--text-primary); }

    footer { margin-top: var(--gap-lg); padding-top: var(--gap-md); border-top: 1px solid var(--border-light); font-size: 11px; color: var(--text-tertiary); text-align: center; }

    #chartTooltip { position: fixed; display: none; pointer-events: none; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-size: 12px; color: var(--text-secondary); z-index: 1000; max-width: 480px; user-select: text; cursor: text; white-space: pre-wrap; line-height: 1.6; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    #chartTooltip.hover { display: block; pointer-events: none; }
    #chartTooltip.pinned { display: block; pointer-events: auto; border-color: var(--brand); border-width: 2px; }
    #chartTooltip .tt-close { position: absolute; top: 4px; right: 8px; cursor: pointer; color: var(--text-tertiary); font-size: 16px; line-height: 1; padding: 2px 4px; }
    #chartTooltip .tt-close:hover { color: var(--text-primary); }
    #chartTooltip .tt-title { font-weight: 600; color: var(--text-primary); margin-bottom: 4px; padding-right: 20px; }
    #chartTooltip .tt-line { color: var(--text-secondary); }
    #chartTooltip .tt-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>ATOM Mesh PD Benchmark <span class="h1-sub">— SLURM nightly</span></h1>
        <div class="meta" id="meta">Loading…</div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle">☼ Theme</button>
      </div>
    </header>

    <div class="filter-bar" id="filterBar">
      <label>Source</label><select id="fSource"></select>
      <label>Model</label><select id="fModel"></select>
      <label>Backend</label><select id="fBackend"></select>
      <label>Config</label><select id="fConfig"></select>
      <label>Precision</label><select id="fPrecision"></select>
      <label>ISL</label><select id="fISL"></select>
      <label>OSL</label><select id="fOSL"></select>
      <label>Date</label><select id="fDate"></select>
      <button class="filter-reset" id="filterReset">Reset</button>
    </div>

    <div class="kpi-row" id="kpiRow"></div>

    <div class="tabs">
      <button class="tab active" data-tab="pareto">Pareto (TPOT vs Throughput)</button>
      <button class="tab" data-tab="ttft">TTFT vs Concurrency</button>
      <button class="tab" data-tab="trend">Time Series</button>
      <button class="tab" data-tab="table">Table</button>
    </div>

    <div class="tab-panel active" data-panel="pareto">
      <div class="chart-wrap">
        <div class="chart-controls">
          <label>X</label>
          <select id="paretoX">
            <option value="interactivity">Interactivity (tok/s/user)</option>
            <option value="per_user_tput">Per-user output throughput (tok/s/user)</option>
            <option value="total_tput">Total token throughput (tok/s)</option>
            <option value="output_tput">Output throughput (tok/s)</option>
            <option value="concurrency">Concurrency</option>
          </select>
          <label>Y</label>
          <select id="paretoY">
            <option value="tput_per_gpu">Token Throughput per GPU (tok/s/gpu)</option>
            <option value="tpot_ms">Mean TPOT (ms)</option>
            <option value="tpot_p99">P99 TPOT (ms)</option>
            <option value="ttft_ms">Mean TTFT (ms)</option>
            <option value="ttft_p99">P99 TTFT (ms)</option>
            <option value="e2el_ms">Mean E2E latency (ms)</option>
          </select>
        </div>
        <div class="chart-canvas"><canvas id="paretoChart"></canvas></div>
      </div>
    </div>

    <div class="tab-panel" data-panel="ttft">
      <div class="chart-wrap">
        <div class="chart-controls">
          <label>Y</label>
          <select id="ttftY">
            <option value="ttft_ms">Mean TTFT (ms)</option>
            <option value="ttft_p99">P99 TTFT (ms)</option>
            <option value="tpot_ms">Mean TPOT (ms)</option>
            <option value="output_tput">Output throughput (tok/s)</option>
          </select>
        </div>
        <div class="chart-canvas"><canvas id="ttftChart"></canvas></div>
      </div>
    </div>

    <div class="tab-panel" data-panel="trend">
      <div class="chart-wrap">
        <div class="chart-controls">
          <label>ISL</label><select id="trendISL"></select>
          <label>OSL</label><select id="trendOSL"></select>
          <label>Concurrency</label><select id="trendConc"></select>
          <label>Ratio</label><select id="trendRatio"></select>
          <label>Metric</label>
          <select id="trendMetric">
            <option value="tpot_ms">Mean TPOT (ms)</option>
            <option value="ttft_ms">Mean TTFT (ms)</option>
            <option value="output_tput">Output throughput (tok/s)</option>
            <option value="total_tput">Total token throughput (tok/s)</option>
            <option value="e2el_ms">Mean E2E latency (ms)</option>
            <option value="gsm8k">GSM8K accuracy</option>
          </select>
        </div>
        <div class="chart-canvas"><canvas id="trendChart"></canvas></div>
      </div>
    </div>

    <div class="tab-panel" data-panel="table">
      <div class="chart-wrap" style="overflow-x:auto;">
        <table id="dataTable">
          <thead>
            <tr>
              <th data-key="date">Date</th>
              <th data-key="config_label">Config</th>
              <th data-key="isl">ISL</th>
              <th data-key="osl">OSL</th>
              <th data-key="concurrency">Conc</th>
              <th data-key="ratio">Ratio</th>
              <th data-key="ttft_ms">TTFT (ms)</th>
              <th data-key="ttft_p99">TTFT P99</th>
              <th data-key="tpot_ms">TPOT (ms)</th>
              <th data-key="tpot_p99">TPOT P99</th>
              <th data-key="output_tput">Output tok/s</th>
              <th data-key="total_tput">Total tok/s</th>
              <th data-key="per_user_tput">tok/s/user</th>
              <th data-key="gsm8k">GSM8K</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="chartTooltip"></div>
    <footer>
      <span id="footerInfo"></span> · Source: <code id="footerSource"></code> ·
      Rebuild with <code>./update_data.py</code>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
  // ============================================================
  // Theme
  // ============================================================
  const themeBtn = document.getElementById('themeToggle');
  themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? '' : 'light';
    if (next) document.documentElement.setAttribute('data-theme', 'light');
    else document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('amd-dash-theme', next || 'dark');
    rebuildAll();
  });

  // ============================================================
  // Data loading — fetch data/index.json then each per-run file
  // ============================================================
  let RAW = {runs: [], lastUpdate: null, source: ''};
  const ALL_ROWS = [];

  async function loadData() {
    const idx = await fetch('data/index.json', {cache: 'no-store'}).then(r => {
      if (!r.ok) throw new Error(`index.json: HTTP ${r.status}`);
      return r.json();
    });
    const runs = await Promise.all(
      idx.runs.map(meta => fetch(`data/${meta.file}`, {cache: 'no-store'})
        .then(r => r.ok ? r.json() : Promise.reject(new Error(`${meta.file}: HTTP ${r.status}`))))
    );
    RAW = {lastUpdate: idx.lastUpdate, source: idx.source, runs};
    ALL_ROWS.length = 0;
    runs.forEach(run => {
      run.points.forEach(p => {
        const per_user = p.output_tput && p.concurrency ? p.output_tput / p.concurrency : null;
        ALL_ROWS.push({
          run_id: run.run_id,
          date: run.date,
          timestamp: run.timestamp,
          model: run.model,
          backend: run.backend,
          config_label: run.config_label,
          source: run.source || 'SLURM',
          hardware: p.hardware || run.hardware || 'mi355x',
          gsm8k: run.gsm8k,
          ...p,
          precision: p.precision || 'fp8',
          per_user_tput: per_user,
          interactivity: p.interactivity != null ? p.interactivity : per_user,
          tput_per_gpu: p.tput_per_gpu != null ? p.tput_per_gpu : null,
        });
      });
    });
  }

  // ============================================================
  // Filters
  // ============================================================
  const FILTER_DEFS = [
    {id: 'fSource', key: 'source'},
    {id: 'fModel', key: 'model'},
    {id: 'fBackend', key: 'backend'},
    {id: 'fConfig', key: 'config_label'},
    {id: 'fPrecision', key: 'precision'},
    {id: 'fISL', key: 'isl'},
    {id: 'fOSL', key: 'osl'},
    {id: 'fDate', key: 'date'},
  ];
  function uniqueSorted(rows, key) {
    const s = new Set(rows.map(r => r[key]).filter(v => v !== null && v !== undefined));
    return [...s].sort((a, b) => {
      if (typeof a === 'number' && typeof b === 'number') return a - b;
      return String(a).localeCompare(String(b));
    });
  }
  function fillSelect(sel, vals, includeAll = true) {
    sel.innerHTML = '';
    if (includeAll) {
      const opt = document.createElement('option');
      opt.value = '__all__'; opt.textContent = 'All';
      sel.appendChild(opt);
    }
    vals.forEach(v => {
      const opt = document.createElement('option');
      opt.value = String(v); opt.textContent = String(v);
      sel.appendChild(opt);
    });
  }
  function initFilters() {
    FILTER_DEFS.forEach(({id, key}) => {
      fillSelect(document.getElementById(id), uniqueSorted(ALL_ROWS, key));
    });
    // Default Precision to fp4
    document.getElementById('fPrecision').value = 'fp4';
    // Default Date to latest SLURM date
    const slurmDates = ALL_ROWS.filter(r => r.source === 'SLURM').map(r => r.date).filter(Boolean);
    if (slurmDates.length) {
      const latest = slurmDates.sort().pop();
      document.getElementById('fDate').value = latest;
    }
  }
  function currentFilters() {
    const f = {};
    FILTER_DEFS.forEach(({id, key}) => {
      const v = document.getElementById(id).value;
      if (v !== '__all__') f[key] = v;
    });
    return f;
  }
  function filterRows() {
    const f = currentFilters();
    return ALL_ROWS.filter(r => {
      // InferenceX data always shown regardless of date filter
      if (r.source === 'InferenceX' && f.date) {
        const fNoDate = {...f};
        delete fNoDate.date;
        for (const k in fNoDate) if (String(r[k]) !== fNoDate[k]) return false;
        return true;
      }
      for (const k in f) if (String(r[k]) !== f[k]) return false;
      return true;
    });
  }
  document.getElementById('filterReset').addEventListener('click', () => {
    FILTER_DEFS.forEach(({id}) => { document.getElementById(id).value = '__all__'; });
    rebuildAll();
  });
  FILTER_DEFS.forEach(({id}) => {
    document.getElementById(id).addEventListener('change', rebuildAll);
  });

  // ============================================================
  // Tabs
  // ============================================================
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`).classList.add('active');
      rebuildAll();
    });
  });

  // ============================================================
  // Color: B200 = NV green, MI355X (MoRI) = red, SLURM (ours) = pink
  // ============================================================
  const SOURCE_COLORS = {
    'b200':   {base: '#76b900', variants: ['#76b900', '#5a8f00']},   // NV green
    'mi355x': {base: '#e04040', variants: ['#e04040', '#c03030']},   // red
    'slurm':  {base: '#d86ecc', variants: ['#d86ecc', '#b84eac']},   // pink (brand)
  };
  function colorFor(label, rows) {
    if (!rows || !rows.length) {
      let h = 0;
      for (let i = 0; i < label.length; i++) h = (h * 31 + label.charCodeAt(i)) | 0;
      return `hsl(${Math.abs(h) % 360}, 60%, 60%)`;
    }
    const r0 = rows[0];
    const hw = (r0.hardware || '').toLowerCase();
    const src = (r0.source || '').toLowerCase();
    const prec = (r0.precision || 'fp8').toLowerCase();
    let key = src === 'slurm' ? 'slurm' : hw;
    const entry = SOURCE_COLORS[key];
    if (!entry) {
      let h = 0;
      for (let i = 0; i < label.length; i++) h = (h * 31 + label.charCodeAt(i)) | 0;
      return `hsl(${Math.abs(h) % 360}, 60%, 60%)`;
    }
    const idx = prec === 'fp4' ? 0 : 1;
    return entry.variants[idx] || entry.base;
  }

  // ============================================================
  // Theme-aware chart options
  // ============================================================
  function themeColors() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    return isLight
      ? {grid: 'rgba(0,0,0,0.10)', tick: '#5a5d70', legend: '#4a4d5e', tooltipBg: '#ffffff', tooltipBd: '#d0d3dc'}
      : {grid: 'rgba(255,255,255,0.08)', tick: '#bfc1d0', legend: '#bfc1d0', tooltipBg: '#1c1d24', tooltipBd: '#303140'};
  }
  function baseChartOptions(xTitle, yTitle, xType = 'linear') {
    const c = themeColors();
    return {
      responsive: true, maintainAspectRatio: false,
      animation: {duration: 200},
      interaction: {mode: 'nearest', intersect: false},
      plugins: {
        legend: {position: 'right', labels: {color: c.legend, font: {size: 11}, boxWidth: 12, filter: item => !item.text.endsWith('(points)')}},
        tooltip: {
          backgroundColor: c.tooltipBg, borderColor: c.tooltipBd, borderWidth: 1,
          titleColor: c.legend, bodyColor: c.legend, padding: 10, displayColors: true,
        },
      },
      scales: {
        x: {type: xType, title: {display: true, text: xTitle, color: c.legend}, grid: {color: c.grid}, ticks: {color: c.tick}},
        y: {title: {display: true, text: yTitle, color: c.legend}, grid: {color: c.grid}, ticks: {color: c.tick}},
      },
    };
  }

  // ============================================================
  // Pareto chart
  // ============================================================
  let paretoChart = null;
  const METRIC_LABEL = {
    interactivity: 'Interactivity (tok/s/user)',
    per_user_tput: 'Per-user output throughput (tok/s/user)',
    tput_per_gpu: 'Token Throughput per GPU (tok/s/gpu)',
    total_tput: 'Total token throughput (tok/s)',
    output_tput: 'Output throughput (tok/s)',
    concurrency: 'Concurrency',
    tpot_ms: 'Mean TPOT (ms)', tpot_p99: 'P99 TPOT (ms)',
    ttft_ms: 'Mean TTFT (ms)', ttft_p99: 'P99 TTFT (ms)',
    e2el_ms: 'Mean E2E latency (ms)',
    gsm8k: 'GSM8K accuracy (strict-match)',
  };
  // Pareto frontier (upper-left): sorted by X asc, Y strictly decreasing.
  function paretoFrontUpperLeft(pts) {
    if (pts.length <= 1) return pts;
    const sorted = pts.slice().sort((a, b) => a.x === b.x ? b.y - a.y : a.x - b.x);
    const stack = [];
    for (const p of sorted) {
      if (stack.length > 0 && p.x === stack[stack.length - 1].x) {
        if (p.y > stack[stack.length - 1].y) stack[stack.length - 1] = p;
        continue;
      }
      while (stack.length > 0 && p.y >= stack[stack.length - 1].y) stack.pop();
      stack.push(p);
    }
    return stack;
  }

  // D3 curveMonotoneX — exact algorithm from d3-shape source.
  // Generates dense interpolated points so Chart.js just draws straight segments.
  function d3MonotoneX(points, nPerSeg = 24) {
    const n = points.length;
    if (n <= 2) return points;
    const t = new Array(n);
    for (let i = 1; i < n - 1; i++) {
      const h0 = points[i].x - points[i - 1].x;
      const h1 = points[i + 1].x - points[i].x;
      const s0 = (points[i].y - points[i - 1].y) / (h0 || (h1 < 0 ? -0 : 0));
      const s1 = (points[i + 1].y - points[i].y) / (h1 || (h0 < 0 ? -0 : 0));
      const p = (s0 * h1 + s1 * h0) / (h0 + h1);
      const sgn = (s0 < 0 ? -1 : 1) + (s1 < 0 ? -1 : 1);
      t[i] = sgn * Math.min(Math.abs(s0), Math.abs(s1), 0.5 * Math.abs(p)) || 0;
    }
    const hF = points[1].x - points[0].x;
    t[0] = hF ? (3 * (points[1].y - points[0].y) / hF - t[1]) / 2 : t[1];
    const hL = points[n - 1].x - points[n - 2].x;
    t[n - 1] = hL ? (3 * (points[n - 1].y - points[n - 2].y) / hL - t[n - 2]) / 2 : t[n - 2];
    const out = [];
    for (let i = 0; i < n - 1; i++) {
      const x0 = points[i].x, y0 = points[i].y;
      const x1 = points[i + 1].x, y1 = points[i + 1].y;
      const dx = (x1 - x0) / 3;
      const cp1x = x0 + dx, cp1y = y0 + dx * t[i];
      const cp2x = x1 - dx, cp2y = y1 - dx * t[i + 1];
      for (let j = (i === 0 ? 0 : 1); j <= nPerSeg; j++) {
        const u = j / nPerSeg, v = 1 - u;
        out.push({
          x: v * v * v * x0 + 3 * v * v * u * cp1x + 3 * v * u * u * cp2x + u * u * u * x1,
          y: v * v * v * y0 + 3 * v * v * u * cp1y + 3 * v * u * u * cp2y + u * u * u * y1,
        });
      }
    }
    return out;
  }

  let tooltipPinned = false;
  const ttEl = document.getElementById('chartTooltip');

  function tooltipHtml(r, pinned) {
    const f = (v, d=2) => v != null ? v.toFixed(d) : '—';
    const hw = (r.hardware || '').toUpperCase();
    const title = r.source === 'InferenceX' ? `${hw} (${r.backend || r.config_label})` : r.config_label;
    let html = '';
    if (pinned) html += '<span class="tt-close">&times;</span>';
    html += `<div class="tt-title">${title}</div>`;
    const line = t => `<div class="tt-line">${t}</div>`;
    if (r.point_date || r.date) html += line(`Date: ${r.point_date || r.date}`);
    if (r.image) html += line(`Image: ${r.image}`);
    html += line(`Interactivity (tok/s/user): ${f(r.interactivity || r.per_user_tput, 12)}`);
    if (r.tput_per_gpu != null) html += line(`Token Throughput per GPU (tok/s/gpu): ${f(r.tput_per_gpu, 12)}`);
    if (r.input_tput_per_gpu != null) html += line(`Input Token Throughput per GPU: ${f(r.input_tput_per_gpu, 12)}`);
    if (r.output_tput_per_gpu != null) html += line(`Output Token Throughput per GPU: ${f(r.output_tput_per_gpu, 12)}`);
    if (r.total_gpu) {
      html += line(`Total GPUs: ${r.total_gpu}`);
      const pDpa = r.prefill_dpa != null ? `, DPA: ${r.prefill_dpa}` : '';
      const pW = r.prefill_workers != null ? `, Workers: ${r.prefill_workers}` : '';
      html += line(`Prefill: ${r.num_prefill_gpu} GPUs, TP: ${r.prefill_tp}${r.prefill_ep != null ? ', EP: '+r.prefill_ep : ''}${pDpa}${pW}`);
      const dDpa = r.decode_dpa != null ? `, DPA: ${r.decode_dpa}` : '';
      const dW = r.decode_workers != null ? `, Workers: ${r.decode_workers}` : '';
      html += line(`Decode: ${r.num_decode_gpu} GPUs, TP: ${r.decode_tp}${r.decode_ep != null ? ', EP: '+r.decode_ep : ''}${dDpa}${dW}`);
    }
    html += line(`Concurrency: ${r.concurrency}`);
    if (r.source === 'InferenceX') html += line(`Precision: ${(r.precision || 'FP8').toUpperCase()}`);
    html += line(`TPOT: ${f(r.tpot_ms)} ms (p99 ${f(r.tpot_p99)})`);
    html += line(`TTFT: ${f(r.ttft_ms, 0)} ms (p99 ${f(r.ttft_p99, 0)})`);
    if (!pinned) html += '<div class="tt-hint">Click to pin</div>';
    return html;
  }

  function dismissTooltip() {
    tooltipPinned = false;
    ttEl.className = '';
    ttEl.style.display = 'none';
  }

  function showTooltipAt(r, x, y, pinned) {
    ttEl.innerHTML = tooltipHtml(r, pinned);
    ttEl.style.left = x + 'px';
    ttEl.style.top = y + 'px';
    tooltipPinned = pinned;
    ttEl.className = pinned ? 'pinned' : 'hover';
    ttEl.style.display = 'block';
    if (pinned) {
      const closeBtn = ttEl.querySelector('.tt-close');
      if (closeBtn) closeBtn.addEventListener('click', e => { e.stopPropagation(); dismissTooltip(); });
    }
  }

  // Dismiss pinned tooltip on outside click or Escape
  ttEl.addEventListener('mousedown', e => e.stopPropagation());
  ttEl.addEventListener('click', e => e.stopPropagation());
  document.addEventListener('mousedown', () => { if (tooltipPinned) dismissTooltip(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && tooltipPinned) dismissTooltip(); });

  function findNearestPoint(chart, evt) {
    const elems = chart.getElementsAtEventForMode(evt, 'point', {intersect: false}, true);
    for (const dp of elems) {
      const raw = chart.data.datasets[dp.datasetIndex].data[dp.index];
      if (raw?._r) return {r: raw._r, elem: dp};
    }
    return null;
  }

  function setupParetoInteraction(chart) {
    let hoverTimer = null;
    // Hover: show tooltip on mousemove near a point
    chart.canvas.addEventListener('mousemove', e => {
      if (tooltipPinned) return;
      clearTimeout(hoverTimer);
      hoverTimer = setTimeout(() => {
        const hit = findNearestPoint(chart, e);
        if (!hit) { if (!tooltipPinned) ttEl.style.display = 'none'; return; }
        const rect = chart.canvas.getBoundingClientRect();
        const meta = chart.getDatasetMeta(hit.elem.datasetIndex);
        const pt = meta.data[hit.elem.index];
        showTooltipAt(hit.r, rect.left + pt.x + 14, rect.top + pt.y - 14, false);
      }, 30);
    });
    chart.canvas.addEventListener('mouseleave', () => {
      clearTimeout(hoverTimer);
      if (!tooltipPinned) ttEl.style.display = 'none';
    });
    // Click: pin tooltip
    chart.canvas.addEventListener('mousedown', e => {
      e.stopPropagation(); // prevent document mousedown from dismissing immediately
      if (tooltipPinned) { dismissTooltip(); return; }
      const hit = findNearestPoint(chart, e);
      if (!hit) return;
      const rect = chart.canvas.getBoundingClientRect();
      const meta = chart.getDatasetMeta(hit.elem.datasetIndex);
      const pt = meta.data[hit.elem.index];
      showTooltipAt(hit.r, rect.left + pt.x + 14, rect.top + pt.y - 14, true);
    });
  }

  const GPU_CFG_RE = /(\d+p_tp\d+_\d+d_tp\d+)/;
  function gpuConfigKey(configLabel) {
    const m = GPU_CFG_RE.exec(configLabel || '');
    return m ? m[1] : configLabel;
  }

  function aggregateForPareto(rows) {
    // Group by (source, hardware, precision, ISL, OSL).
    // For SLURM: multiple GPU configs → merge into one curve per (precision, ISL, OSL).
    //   Within each GPU config, keep only the latest date's points.
    // For InferenceX: already combined by fetch_external.py.
    const curves = {};
    rows.forEach(r => {
      const isSlurm = (r.source || '') === 'SLURM';
      const prec = (r.precision || 'fp8').toUpperCase();
      const curveKey = isSlurm
        ? `MI355X ${prec} sglang-atom-mesh · ${r.isl}/${r.osl}`
        : `${(r.hardware || '').toUpperCase()} ${prec} ${r.backend} · ${r.isl}/${r.osl}`;
      if (!curves[curveKey]) curves[curveKey] = {};
      const cfgKey = isSlurm ? gpuConfigKey(r.config_label) : '__combined__';
      const prev = curves[curveKey][cfgKey];
      if (!prev || r.date > prev.date) {
        curves[curveKey][cfgKey] = {date: r.date, rows: []};
      }
      if (r.date === curves[curveKey][cfgKey].date) {
        curves[curveKey][cfgKey].rows.push(r);
      }
    });
    const result = {};
    for (const [curveKey, cfgs] of Object.entries(curves)) {
      result[curveKey] = [];
      for (const cfg of Object.values(cfgs)) {
        result[curveKey].push(...cfg.rows);
      }
    }
    return result;
  }

  function buildPareto() {
    const rows = filterRows();
    const xKey = document.getElementById('paretoX').value;
    const yKey = document.getElementById('paretoY').value;
    const groups = aggregateForPareto(rows);
    const datasets = [];
    Object.keys(groups).sort().forEach(label => {
      const allPts = groups[label]
        .filter(r => r[xKey] != null && r[yKey] != null)
        .map(r => ({x: r[xKey], y: r[yKey], _r: r}))
        .sort((a, b) => a.x - b.x);
      const frontPts = paretoFrontUpperLeft(allPts);
      const c = colorFor(label, groups[label]);
      const smoothPts = d3MonotoneX(frontPts);
      datasets.push({
        label, data: smoothPts, borderColor: c, backgroundColor: 'transparent',
        pointRadius: 0, pointHoverRadius: 0, pointHitRadius: 0, borderWidth: 2.5,
        showLine: true, tension: 0,
      });
      // Layer 2: All data points as scatter (no connecting line)
      datasets.push({
        label: label + ' (points)', data: allPts, borderColor: c, backgroundColor: c,
        pointRadius: 5, pointHoverRadius: 7,
        borderWidth: 0, showLine: false, legendHide: true,
      });
    });
    if (paretoChart) paretoChart.destroy();
    dismissTooltip();
    const opts = baseChartOptions(METRIC_LABEL[xKey], METRIC_LABEL[yKey]);
    opts.plugins.tooltip.enabled = false;
    opts.interaction = {mode: 'nearest', intersect: false};
    paretoChart = new Chart(document.getElementById('paretoChart'), {type: 'line', data: {datasets}, options: opts});
    setupParetoInteraction(paretoChart);
  }
  document.getElementById('paretoX').addEventListener('change', buildPareto);
  document.getElementById('paretoY').addEventListener('change', buildPareto);

  // ============================================================
  // TTFT vs concurrency
  // ============================================================
  let ttftChart = null;
  function buildTtft() {
    const rows = filterRows();
    const yKey = document.getElementById('ttftY').value;
    const groups = {};
    rows.forEach(r => {
      const k = `${r.date} · ISL${r.isl} OSL${r.osl} r${r.ratio}`;
      (groups[k] = groups[k] || []).push(r);
    });
    const datasets = Object.keys(groups).sort().map(label => {
      const grp = groups[label];
      const pts = grp
        .filter(r => r[yKey] != null)
        .map(r => ({x: r.concurrency, y: r[yKey]}))
        .sort((a, b) => a.x - b.x);
      const c = colorFor(label, grp);
      return {label, data: pts, borderColor: c, backgroundColor: c, pointRadius: 5, borderWidth: 2.5, showLine: true, tension: 0};
    });
    if (ttftChart) ttftChart.destroy();
    const opts = baseChartOptions('Concurrency', METRIC_LABEL[yKey]);
    ttftChart = new Chart(document.getElementById('ttftChart'), {type: 'line', data: {datasets}, options: opts});
  }
  document.getElementById('ttftY').addEventListener('change', buildTtft);

  // ============================================================
  // Time series
  // ============================================================
  let trendChart = null;
  function refreshTrendDropdowns() {
    const rows = filterRows();
    const opts = (key) => uniqueSorted(rows, key);
    [['trendISL', 'isl'], ['trendOSL', 'osl'], ['trendConc', 'concurrency'], ['trendRatio', 'ratio']]
      .forEach(([id, key]) => {
        const sel = document.getElementById(id);
        const prev = sel.value;
        fillSelect(sel, opts(key), true);
        if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
      });
  }
  function buildTrend() {
    refreshTrendDropdowns();
    const rows = filterRows();
    const isl = document.getElementById('trendISL').value;
    const osl = document.getElementById('trendOSL').value;
    const conc = document.getElementById('trendConc').value;
    const ratio = document.getElementById('trendRatio').value;
    const metric = document.getElementById('trendMetric').value;
    const sub = rows.filter(r => {
      if (isl !== '__all__' && String(r.isl) !== isl) return false;
      if (osl !== '__all__' && String(r.osl) !== osl) return false;
      if (conc !== '__all__' && String(r.concurrency) !== conc) return false;
      if (ratio !== '__all__' && String(r.ratio) !== ratio) return false;
      return true;
    });
    const groups = {};
    sub.forEach(r => {
      const k = `${r.config_label} · ISL${r.isl} OSL${r.osl} c${r.concurrency} r${r.ratio}`;
      (groups[k] = groups[k] || []).push(r);
    });
    const datasets = Object.keys(groups).sort().map(label => {
      const pts = groups[label]
        .filter(r => r[metric] != null)
        .map(r => ({x: r.date, y: r[metric]}))
        .sort((a, b) => a.x.localeCompare(b.x));
      const c = colorFor(label, groups[label]);
      return {label, data: pts, borderColor: c, backgroundColor: c, pointRadius: 5, borderWidth: 2, showLine: true, tension: 0};
    });
    if (trendChart) trendChart.destroy();
    const opts = baseChartOptions('Date', METRIC_LABEL[metric]);
    opts.scales.x.type = 'category';
    trendChart = new Chart(document.getElementById('trendChart'), {type: 'line', data: {datasets}, options: opts});
  }
  ['trendISL', 'trendOSL', 'trendConc', 'trendRatio', 'trendMetric'].forEach(id => {
    document.getElementById(id).addEventListener('change', buildTrend);
  });

  // ============================================================
  // Table
  // ============================================================
  let tableSortKey = 'date', tableSortDir = -1;
  function fmt(v, digits = 2) {
    if (v == null) return '—';
    if (typeof v === 'number') return v.toFixed(digits);
    return String(v);
  }
  function buildTable() {
    const rows = filterRows().slice();
    rows.sort((a, b) => {
      const av = a[tableSortKey], bv = b[tableSortKey];
      if (av == null) return 1; if (bv == null) return -1;
      if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * tableSortDir;
      return String(av).localeCompare(String(bv)) * tableSortDir;
    });
    const tbody = document.querySelector('#dataTable tbody');
    tbody.innerHTML = '';
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${r.date}</td>
        <td><code>${r.config_label}</code></td>
        <td class="num">${r.isl}</td>
        <td class="num">${r.osl}</td>
        <td class="num">${r.concurrency}</td>
        <td class="num">${r.ratio}</td>
        <td class="num">${fmt(r.ttft_ms, 0)}</td>
        <td class="num">${fmt(r.ttft_p99, 0)}</td>
        <td class="num">${fmt(r.tpot_ms, 2)}</td>
        <td class="num">${fmt(r.tpot_p99, 2)}</td>
        <td class="num">${fmt(r.output_tput, 1)}</td>
        <td class="num">${fmt(r.total_tput, 1)}</td>
        <td class="num">${fmt(r.per_user_tput, 1)}</td>
        <td class="num">${fmt(r.gsm8k, 4)}</td>
      `;
      tbody.appendChild(tr);
    });
    document.querySelectorAll('#dataTable th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
      if (th.dataset.key === tableSortKey) th.classList.add(tableSortDir > 0 ? 'sort-asc' : 'sort-desc');
    });
  }
  document.querySelectorAll('#dataTable th').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.key;
      if (tableSortKey === k) tableSortDir *= -1;
      else { tableSortKey = k; tableSortDir = 1; }
      buildTable();
    });
  });

  // ============================================================
  // KPI
  // ============================================================
  function buildKpi() {
    const rows = filterRows();
    const kpiRow = document.getElementById('kpiRow');
    if (!rows.length) {
      kpiRow.innerHTML = '<div class="kpi-card"><div class="kpi-label">No data</div><div class="kpi-value" style="font-size:14px;">Adjust filters or run update_data.py</div></div>';
      return;
    }
    rows.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    const latest = rows[0];
    const numRuns = new Set(rows.map(r => r.run_id)).size;
    const cards = [
      {label: 'Latest TPOT', value: fmt(latest.tpot_ms, 2), unit: 'ms', sub: `c=${latest.concurrency} ISL${latest.isl}`},
      {label: 'Latest TTFT', value: fmt(latest.ttft_ms, 0), unit: 'ms', sub: `p99 ${fmt(latest.ttft_p99, 0)}`},
      {label: 'Latest Output tput', value: fmt(latest.output_tput, 0), unit: 'tok/s', sub: `${fmt(latest.per_user_tput, 1)} per user`},
      {label: 'Latest Total tput', value: fmt(latest.total_tput, 0), unit: 'tok/s', sub: `${latest.completed} prompts`},
      {label: 'GSM8K (latest run)', value: fmt(latest.gsm8k, 4), unit: '', sub: `${latest.model || ''}`},
      {label: 'Coverage', value: String(rows.length), unit: 'pts', sub: `${numRuns} run(s)`},
    ];
    kpiRow.innerHTML = cards.map(c => `
      <div class="kpi-card">
        <div class="kpi-label">${c.label}</div>
        <div class="kpi-value">${c.value}<span class="kpi-unit">${c.unit ? ' ' + c.unit : ''}</span></div>
        <div class="kpi-sub">${c.sub || ''}</div>
      </div>
    `).join('');
  }

  // ============================================================
  // Header / footer meta
  // ============================================================
  function buildMeta() {
    const ts = RAW.lastUpdate ? new Date(RAW.lastUpdate).toISOString().replace('T', ' ').slice(0, 19) : '—';
    const numRuns = RAW.runs.length;
    const numPts = ALL_ROWS.length;
    document.getElementById('meta').textContent = `Updated ${ts}  ·  ${numRuns} run(s)  ·  ${numPts} sweep points`;
    document.getElementById('footerInfo').textContent = `${numRuns} run(s), ${numPts} points`;
    document.getElementById('footerSource').textContent = RAW.source || '—';
  }

  // ============================================================
  // Drive
  // ============================================================
  function rebuildAll() {
    buildKpi();
    const active = document.querySelector('.tab.active').dataset.tab;
    if (active === 'pareto') buildPareto();
    else if (active === 'ttft') buildTtft();
    else if (active === 'trend') buildTrend();
    else if (active === 'table') buildTable();
  }

  document.getElementById('meta').textContent = 'Loading data/index.json …';
  loadData().then(() => {
    initFilters();
    buildMeta();
    rebuildAll();
  }).catch(err => {
    console.error(err);
    document.getElementById('meta').textContent = `Failed to load data/: ${err.message}`;
    document.getElementById('kpiRow').innerHTML =
      '<div class="kpi-card"><div class="kpi-label">Error</div>' +
      '<div class="kpi-value" style="font-size:14px;">data/ not reachable. ' +
      'Open via http (not file://) and run <code>./update_data.py</code> first.</div></div>';
  });
  </script>
</body>
